<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Contact Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            padding: 50px;
            background: #f8f9fa;
        }

        .container {
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Test Contact UI</h1>
        <p class="text-muted">This form mocks the server response to test the UI states.</p>

        <form id="contactForm" novalidate>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Your Name</label>
                    <input type="text" name="name" class="form-control" required>
                    <div class="invalid-feedback">Name is required</div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" name="phone" class="form-control" placeholder="+91 9876543210" required>
                    <div class="invalid-feedback">Enter valid phone</div>
                </div>
                <div class="col-12">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" required>
                    <div class="invalid-feedback">Enter a valid email address</div>
                </div>
                <div class="col-12">
                    <label class="form-label">Subject</label>
                    <input type="text" name="subject" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Message</label>
                    <textarea name="message" class="form-control" rows="5" required></textarea>
                </div>
                <input type="text" name="website" style="display:none" tabindex="-1" autocomplete="off">
                <div class="col-12">
                    <button type="submit" class="btn btn-custom w-100">Send Message (Test)</button>
                </div>
            </div>
            <div class="form-message"></div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Mocking the validation logic from main.js usually found there
        function validateField(field) {
            const value = $(field).val().trim();
            const type = $(field).attr('type');
            const isRequired = $(field).prop('required');
            let isValid = true;

            if (isRequired && value === '') isValid = false;

            if (value !== '') {
                if (type === 'email') {
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(value)) isValid = false;
                }
            }

            if (isValid) {
                $(field).removeClass('is-invalid').addClass('is-valid');
            } else {
                $(field).removeClass('is-valid').addClass('is-invalid');
            }
            return isValid;
        }

        $('form input, form textarea').on('input blur change', function () {
            validateField(this);
        });

        $('form').on('submit', function (e) {
            e.preventDefault();
            const form = $(this);
            let formIsValid = true;

            form.find('input, textarea').each(function () {
                if (!validateField(this)) {
                    formIsValid = false;
                }
            });

            const msgContainer = form.find('.form-message');

            if (formIsValid) {
                const btn = form.find('button[type="submit"]');
                const originalText = btn.text();
                btn.prop('disabled', true).text('Sending...');

                // MOCK AJAX DELAY
                setTimeout(() => {
                    // SIMULATE SUCCESS RESPONSE
                    const response = { success: true, message: 'Thank you for your message! We will get back to you soon.' };

                    btn.prop('disabled', false).text(originalText);
                    if (msgContainer.length) {
                        msgContainer.removeClass('error').addClass('success')
                            .text(response.message)
                            .slideDown();
                        setTimeout(() => msgContainer.slideUp(), 5000);
                    }
                    form[0].reset();
                    form.find('.is-valid').removeClass('is-valid');
                }, 1500);

            } else {
                if (msgContainer.length) {
                    msgContainer.removeClass('success').addClass('error').text('Please fill all fields correctly.').slideDown();
                }
            }
        });
    </script>
</body>

</html>
